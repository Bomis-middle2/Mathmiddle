<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rational Numbers Quiz</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#eef8ff,#fff7e6);
  min-height:100vh;
  overflow-x:hidden;
}
.logo-screen{
  position:fixed;inset:0;background:white;z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.logo-screen img{max-width:220px;animation:pop 1s ease}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

.bg-star{
  position:fixed;color:#ffd86b;font-size:22px;opacity:.45;
  animation:float 8s linear infinite;z-index:0;
}
@keyframes float{
  from{transform:translateY(100vh) rotate(0deg)}
  to{transform:translateY(-10vh) rotate(360deg)}
}

.container{
  position:relative;z-index:1;
  max-width:850px;margin:auto;padding:18px;
}
.card{
  background:rgba(255,255,255,.94);
  border-radius:22px;padding:22px;
  box-shadow:0 10px 28px rgba(0,0,0,.12);
}
h1,h2{margin-top:0;color:#21466b}
button{
  border:0;border-radius:14px;padding:13px 18px;
  font-size:16px;cursor:pointer;background:#3478f6;color:white;
}
button:hover{opacity:.9}
.option{
  display:block;width:100%;margin:10px 0;text-align:left;
  background:#f3f7ff;color:#222;border:2px solid #dbe7ff;
}
.option:hover{background:#e8f0ff}
.topbar{
  display:flex;justify-content:space-between;gap:10px;
  margin-bottom:14px;font-weight:bold;flex-wrap:wrap;
}
.timer{color:#d35400}
.score{color:#187b37}
.question-img{
  width:100%;max-width:520px;display:block;margin:12px auto;
  border-radius:16px;border:2px solid #ddd;
}
.feedback{
  min-height:35px;font-weight:bold;margin-top:12px;
}
.correct{color:#148a38}
.wrong{color:#c0392b}
.explain{
  background:#fff4d6;border-left:5px solid #f4b400;
  padding:10px;border-radius:10px;margin-top:8px;
}
.confetti{
  position:fixed;top:-20px;font-size:22px;z-index:999;
  animation:fall 1.2s linear forwards;
}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0}}
.cross{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
  font-size:70px;color:#e74c3c;z-index:999;animation:fade .7s forwards;
}
@keyframes fade{to{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
.small{font-size:14px;color:#555}
</style>
</head>
<body>

<div class="logo-screen" id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
  <p>Loading your quiz...</p>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
const questions = [
  {
    type:"picture",
    situation:"Three friends Aarav, Meera, and Kabir went to GREEN BITE STORE to buy healthy snacks. Observe the price list carefully and answer the question.",
    image:"assets/g8_ch1_im_4.png",
    q:"Aarav buys 1/2 kg dates, 1/4 kg dry figs, and 1/4 kg almond barfi. What is the total cost?",
    options:["Rs 350","Rs 365","Rs 370","Rs 390"],
    answer:1,
    explanation:"Using the given rates from the picture, the total cost is Rs 365."
  },
  {
    type:"picture",
    situation:"Use the same GREEN BITE STORE price list and answer the question.",
    image:"assets/g8_ch1_im_4.png",
    q:"If Aarav had Rs 500 and spent Rs 370, what fraction of his money is left?",
    options:["1/4","13/50","2/5","3/10"],
    answer:1,
    explanation:"Money left = 500 - 370 = 130. Fraction left = 130/500 = 13/50."
  },
  {
    type:"picture",
    situation:"Use the GREEN BITE STORE price list and calculate the total cost.",
    image:"assets/g8_ch1_im_4.png",
    q:"What is the total cost of 1/2 kg mixed seeds and 1/2 kg dates?",
    options:["Rs 200","Rs 220","Rs 240","Rs 250"],
    answer:3,
    explanation:"Adding the costs of 1/2 kg mixed seeds and 1/2 kg dates gives Rs 250."
  },
  {
    type:"picture",
    situation:"Use the GREEN BITE STORE price list and apply multiplication of rational numbers.",
    image:"assets/g8_ch1_im_4.png",
    q:"What is the cost of 5/2 kg mixed seeds?",
    options:["Rs 200","Rs 225","Rs 250","Rs 300"],
    answer:2,
    explanation:"Cost of 5/2 kg mixed seeds is Rs 250."
  },
  {
    type:"picture",
    situation:"Compare the two quantities using the GREEN BITE STORE price list.",
    image:"assets/g8_ch1_im_4.png",
    q:"Which is greater in cost?",
    options:["1/2 kg dates","3/4 kg almond barfi","Both equal","Cannot be determined"],
    answer:2,
    explanation:"Both quantities have equal cost."
  },
  {
    type:"ar",
    q:"Assertion: (-4)/(-9) is positive. Reason: Same signs give positive rational number.",
    options:["Both true, Reason explains","Both true, Reason not explanation","Assertion true, Reason false","Assertion false, Reason true"],
    answer:0,
    explanation:"Both numerator and denominator have the same sign, so the rational number is positive."
  },
  {
    type:"ar",
    q:"Assertion: 6/(-8) = -3/4 in standard form. Reason: Denominator must be positive and no common factors.",
    options:["Both true, Reason explains","Both true, Reason not explanation","Assertion true, Reason false","Assertion false, Reason true"],
    answer:0,
    explanation:"6/(-8) becomes -6/8 = -3/4, with positive denominator and no common factor."
  },
  {
    type:"ar",
    q:"Assertion: Rational numbers are closed under subtraction. Reason: Difference of two rational numbers is rational.",
    options:["Both true, Reason explains","Both true, Reason not explanation","Assertion true, Reason false","Assertion false, Reason true"],
    answer:0,
    explanation:"Subtracting one rational number from another always gives a rational number."
  },
  {
    type:"ar",
    q:"Assertion: Division of rational numbers is commutative. Reason: (3/5) ÷ (1/5) ≠ (1/5) ÷ (3/5).",
    options:["Both true, Reason explains","Both true, Reason not explanation","Assertion true, Reason false","Assertion false, Reason true"],
    answer:3,
    explanation:"Division is not commutative. The reason is true, but the assertion is false."
  }
];

let index = 0, score = 0, attempts = 0, timeLeft = 45, timer;
const app = document.getElementById("app");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

setTimeout(()=>{
  document.getElementById("logoScreen").style.display="none";
  showIntro();
},5000);

function showIntro(){
  app.innerHTML = `
    <h1>Rational Numbers Quiz</h1>
    <p>Welcome! Read each question carefully.</p>
    <p class="small">You get 45 seconds per question and one retry after the first wrong attempt.</p>
    <button onclick="startQuiz()">Start Quiz</button>
  `;
}

function startQuiz(){
  index=0; score=0;
  showQuestion();
}

function showQuestion(){
  clearInterval(timer);
  attempts=0; timeLeft=45;
  const item = questions[index];

  app.innerHTML = `
    <div class="topbar">
      <div>Question ${index+1} of ${questions.length}</div>
      <div class="score">Score: ${score}</div>
      <div class="timer">Time: <span id="time">45</span>s</div>
    </div>
    ${item.situation ? `<p><b>Situation:</b> ${item.situation}</p>` : ""}
    ${item.image ? `<img class="question-img" src="${item.image}" alt="Question Image">` : ""}
    <h2>${item.q}</h2>
    <div id="options">
      ${item.options.map((op,i)=>`<button class="option" onclick="checkAnswer(${i})">${String.fromCharCode(65+i)}. ${op}</button>`).join("")}
    </div>
    <div class="feedback" id="feedback"></div>
  `;

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").textContent = timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      document.getElementById("feedback").innerHTML = `<span class="wrong">Time up! Moving to next question...</span>`;
      setTimeout(nextQuestion,1000);
    }
  },1000);
}

function checkAnswer(selected){
  const item = questions[index];
  const feedback = document.getElementById("feedback");

  if(selected === item.answer){
    clearInterval(timer);
    score++;
    correctSound.play();
    starConfetti();
    feedback.innerHTML = `<span class="correct">Correct! Great work.</span>`;
    disableOptions();
    setTimeout(nextQuestion,1000);
  } else {
    attempts++;
    wrongSound.play();
    redCross();

    if(attempts === 1){
      feedback.innerHTML = `<span class="wrong">Oops! Try once more.</span>`;
    } else {
      clearInterval(timer);
      disableOptions();
      feedback.innerHTML = `
        <span class="wrong">Incorrect.</span>
        <div class="explain">
          Correct Answer: ${String.fromCharCode(65+item.answer)}. ${item.options[item.answer]}<br>
          ${item.explanation}
        </div>
      `;
      setTimeout(nextQuestion,3500);
    }
  }
}

function disableOptions(){
  document.querySelectorAll(".option").forEach(btn=>btn.disabled=true);
}

function nextQuestion(){
  index++;
  if(index < questions.length) showQuestion();
  else showResult();
}

function showResult(){
  clearInterval(timer);
  app.innerHTML = `
    <h1>Quiz Completed!</h1>
    <h2>Your Score: ${score} / ${questions.length}</h2>
    <p>${score >= 7 ? "Excellent work!" : score >= 4 ? "Good effort! Keep practising." : "Revise rational numbers and try again."}</p>
    <button onclick="startQuiz()">Play Again</button>
  `;
}

function starConfetti(){
  for(let i=0;i<20;i++){
    const s=document.createElement("div");
    s.className="confetti";
    s.textContent="★";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(.8+Math.random()*1)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

function redCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✖";
  document.body.appendChild(x);
  setTimeout(()=>x.remove(),800);
}

for(let i=0;i<18;i++){
  const b=document.createElement("div");
  b.className="bg-star";
  b.textContent = i%2===0 ? "★" : "✦";
  b.style.left=Math.random()*100+"vw";
  b.style.animationDelay=Math.random()*8+"s";
  document.body.appendChild(b);
}
</script>
</body>
</html>
