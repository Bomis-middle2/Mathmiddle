<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Handling MCQ Challenge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#dff6ff,#fff4e6,#f3e8ff);
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
}

/* Animated Background */

body::before,
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#ffffff 1px, transparent 1px),
radial-gradient(#ffe066 1px, transparent 1px),
radial-gradient(#ffffff 1px, transparent 1px);
background-size:120px 120px;
animation:moveStars 40s linear infinite;
opacity:0.3;
z-index:0;
}

body::after{
animation-duration:60s;
opacity:0.2;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-120px);
}
}

/* Main Container */

.container{
width:100%;
max-width:850px;
background:white;
border-radius:24px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
position:relative;
z-index:2;
overflow:hidden;
}

.hidden{
display:none;
}

/* Splash */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#splash img{
width:180px;
animation:pulse 2s infinite;
}

#splash h2{
margin-top:20px;
color:#555;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

h1{
text-align:center;
color:#5b21b6;
margin-bottom:10px;
font-size:2rem;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.score,
.timer{
background:#f3f4ff;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
color:#333;
}

.question-number{
color:#777;
margin-bottom:10px;
}

.question{
font-size:1.15rem;
line-height:1.6;
font-weight:bold;
color:#222;
}

.options{
display:grid;
gap:14px;
margin-top:22px;
}

.option{
background:#f8f8ff;
padding:14px;
border-radius:14px;
cursor:pointer;
border:2px solid transparent;
transition:0.3s;
}

.option:hover{
background:#ececff;
transform:translateY(-2px);
}

.correct{
background:#d4ffd9 !important;
border-color:#16a34a !important;
}

.wrong{
background:#ffe0e0 !important;
border-color:#dc2626 !important;
}

.feedback{
margin-top:18px;
font-weight:bold;
min-height:30px;
}

.explanation{
margin-top:10px;
padding:12px;
background:#f5f5f5;
border-radius:12px;
font-size:0.95rem;
color:#444;
}

button{
padding:14px 24px;
border:none;
border-radius:14px;
background:#6d28d9;
color:white;
font-size:1rem;
cursor:pointer;
transition:0.3s;
margin-top:20px;
}

button:hover{
background:#5b21b6;
transform:scale(1.03);
}

.center{
text-align:center;
}

.challenge-box{
background:#fff7d6;
padding:20px;
border-radius:18px;
margin-top:20px;
}

/* Confetti */

.star{
position:fixed;
font-size:24px;
animation:fall 2s linear forwards;
pointer-events:none;
z-index:999;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

/* Wrong Cross */

.cross{
position:fixed;
font-size:28px;
animation:fadeCross 1s ease forwards;
pointer-events:none;
z-index:999;
}

@keyframes fadeCross{
0%{
opacity:1;
transform:scale(1);
}
100%{
opacity:0;
transform:scale(2);
}
}

/* Tables */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#ececff;
}

@media(max-width:600px){

.question{
font-size:1rem;
}

.option{
font-size:0.95rem;
}

h1{
font-size:1.6rem;
}

}

</style>
</
