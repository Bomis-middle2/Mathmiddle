<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exponents & Powers Challenge</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#eef7ff,#fff7ed);
overflow-x:hidden;
min-height:100vh;
color:#1f2937;
}

.background-stars span{
position:fixed;
width:10px;
height:10px;
background:#facc15;
clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
opacity:.25;
animation:float 10s linear infinite;
z-index:0;
}

@keyframes float{
from{
transform:translateY(100vh) rotate(0deg);
}
to{
transform:translateY(-20vh) rotate(360deg);
}
}

.logo-screen{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
animation:hideLogo 5s forwards;
}

.logo-screen img{
width:220px;
max-width:80%;
}

@keyframes hideLogo{
0%,85%{
opacity:1;
visibility:visible;
}
100%{
opacity:0;
visibility:hidden;
}
}

.container{
position:relative;
z-index:1;
max-width:760px;
margin:auto;
padding:18px;
}

.card{
background:rgba(255,255,255,.95);
padding:24px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
margin-top:24px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.brand img{
height:45px;
}

.badge{
background:#dbeafe;
padding:10px 16px;
border-radius:999px;
font-weight:bold;
}

h1,h2{
text-align:center;
margin-bottom:12px;
}

.small{
text-align:center;
color:#64748b;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.option{
background:#f8fafc;
border:2px solid #dbeafe;
text-align:left;
}

.option:hover{
background:#dbeafe;
}

.primary{
background:#2563eb;
color:white;
}

.correct{
background:#dcfce7 !important;
border-color:#22c55e !important;
}

.wrong{
background:#fee2e2 !important;
border-color:#ef4444 !important;
}

.hidden{
display:none;
}

.feedback{
min-height:50px;
margin-top:12px;
font-weight:bold;
text-align:center;
}

.timer{
height:12px;
background:#e5e7eb;
border-radius:20px;
overflow:hidden;
margin:15px 0;
}

.timer-fill{
height:100%;
width:100%;
background:#22c55e;
transition:width 1s linear;
}

.cross{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:#ef4444;
opacity:0;
pointer-events:none;
z-index:50;
}

.cross.show{
animation:crossPop .6s;
}

@keyframes crossPop{
0%{
opacity:0;
transform:translate(-50%,-50%) scale(.4);
}
40%{
opacity:1;
transform:translate(-50%,-50%) scale(1.1);
}
100%{
opacity:0;
transform:translate(-50%,-50%) scale(1);
}
}

.confetti{
position:fixed;
top:-20px;
width:14px;
height:14px;
background:#facc15;
clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
animation:fall 1.5s linear forwards;
z-index:40;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.challenge-box{
background:#fff7ed;
padding:18px;
border-radius:18px;
border:2px dashed #fb923c;
margin-top:10px;
}
</style>
</head>

<body>

<div class="logo-screen">
<img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="background-stars">
<span style="left:8%;animation-delay:0s"></span>
<span style="left:25%;animation-delay:2s"></span>
<span style="left:40%;animation-delay:4s"></span>
<span style="left:60%;animation-delay:1s"></span>
<span style="left:80%;animation-delay:3s"></span>
</div>

<div class="cross" id="cross">✖</div>

<audio id="correctSound" src="assets/freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<div class="container">

<div class="header">
<div class="brand">
<img src="assets/innovine-logo.png" alt="Logo">
</div>

<div class="badge">
Score: <span id="score">0</span>
</div>
</div>

<div class="card" id="intro">

<h1>🚀 Exponents & Powers Challenge</h1>

<p class="small">
Grade 7 Mathematics • Chapter 11
</p>

<p style="text-align:center;margin-top:10px;">
Answer the MCQs before the timer ends and become the Power Master!
</p>

<button class="primary" onclick="startQuiz()">
Start Quiz
</button>

</div>

<div class="card hidden" id="quiz">

<div class="header">
<div class="badge">
Question <span id="qNum">1</span>/10
</div>

<div class="badge">
⏳ <span id="time">45</span>s
</div>
</div>

<div class="timer">
<div class="timer-fill" id="timerFill"></div>
</div>

<h2 id="question"></h2>

<div id="options"></div>

<div class="feedback" id="feedback"></div>

</div>

<div class="card hidden" id="finalChallenge">

<h1>🏆 Final Challenge</h1>

<div class="challenge-box">
<p>
If a number doubles 6 times starting from 1, which expression represents it?
</p>
</div>

<button class="option" onclick="checkFinal(0)">2 × 6</button>
<button class="option" onclick="checkFinal(1)">2<sup>6</sup></button>
<button class="option" onclick="checkFinal(2)">6<sup>2</sup></button>

<div class="feedback" id="finalFeedback"></div>

</div>

<div class="card hidden" id="result">

<h1>🎉 Quiz Complete!</h1>

<h2>
Final Score: <span id="finalScore"></span>
</h2>

<p class="small" id="resultMsg"></p>

<button class="primary" onclick="restartQuiz()">
Play Again
</button>

</div>

</div>

<script>

const questions = [

{
q:"A paper is folded again and again. After each fold, the number of parts doubles. After 4 folds, the number of parts is:",
o:["4","8","16","32"],
a:2,
e:"Each fold doubles the number of parts. 2⁴ = 16."
},

{
q:"A bacteria doubles every hour. If there is 1 bacterium at first, the number after 5 hours can be written as:",
o:["2 × 5","2⁵","5²","10⁵"],
a:1,
e:"Doubling 5 times means multiplying by 2 five times → 2⁵."
},

{
q:"In 7⁴, the base is:",
o:["4","7","11","28"],
a:1,
e:"The base is the repeated multiplying number."
},

{
q:"In 5³, the exponent is:",
o:["5","3","15","125"],
a:1,
e:"The exponent tells how many times the base is multiplied."
},

{
q:"The value of 10⁴ is:",
o:["40","100","1000","10000"],
a:3,
e:"10 × 10 × 10 × 10 = 10000."
},

{
q:"The scientific notation of 9000000 is:",
o:["9 × 10⁵","9 × 10⁶","90 × 10⁵","0.9 × 10⁷"],
a:1,
e:"Move the decimal after 9 → 9 × 10⁶."
},

{
q:"The value of 3² × 3⁴ is:",
o:["3⁶","3⁸","9⁶","6⁶"],
a:0,
e:"Same bases are added in exponents → 3²⁺⁴ = 3⁶."
},

{
q:"The value of 8⁵ ÷ 8² is:",
o:["8⁷","8³","1³","8¹⁰"],
a:1,
e:"Subtract exponents for division → 8⁵⁻² = 8³."
},

{
q:"In 2⁶, the base is:",
o:["2","6","8","12"],
a:0,
e:"The base is the number being multiplied repeatedly."
},

{
q:"The value of 2⁶ is:",
o:["12","32","64","128"],
a:2,
e:"2 × 2 × 2 × 2 × 2 × 2 = 64."
}

];

let current = 0;
let score = 0;
let attempts = 0;
let timer;
let timeLeft = 45;

function startQuiz(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
loadQuestion();
}

function loadQuestion(){

clearInterval(timer);

attempts = 0;
timeLeft = 45;

document.getElementById("time").textContent = timeLeft;
document.getElementById("timerFill").style.width = "100%";
document.getElementById("feedback").textContent = "";

const q = questions[current];

document.getElementById("qNum").textContent = current + 1;
document.getElementById("question").innerHTML = q.q;

const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";

q.o.forEach((opt,index)=>{

const btn = document.createElement("button");

btn.className = "option";

btn.innerHTML = String.fromCharCode(65+index)+". "+opt;

btn.onclick = ()=>checkAnswer(index,btn);

optionsDiv.appendChild(btn);

});

timer = setInterval(()=>{

timeLeft--;

document.getElementById("time").textContent = timeLeft;

document.getElementById("timerFill").style.width = (timeLeft/45*100)+"%";

if(timeLeft<=0){

clearInterval(timer);

showCorrect("Time up!");

}

},1000);

}

function checkAnswer(choice,btn){

const q = questions[current];

if(choice===q.a){

clearInterval(timer);

btn.classList.add("correct");

score++;

document.getElementById("score").textContent = score;

document.getElementById("feedback").textContent = "Correct! Excellent!";

playSound("correctSound");

createConfetti();

setTimeout(nextQuestion,1300);

}
else{

attempts++;

btn.classList.add("wrong");

playSound("wrongSound");

showCross();

if(attempts===1){

document.getElementById("feedback").textContent = "Try once more!";

btn.disabled = true;

}
else{

clearInterval(timer);

showCorrect("Incorrect.");

}

}

}

function showCorrect(prefix){

const q = questions[current];

const buttons = document.querySelectorAll(".option");

buttons.forEach((b,i)=>{

b.disabled = true;

if(i===q.a){

b.classList.add("correct");

}

});

document.getElementById("feedback").textContent =
prefix+" Correct Answer: "+q.o[q.a]+". "+q.e;

setTimeout(nextQuestion,3000);

}

function nextQuestion(){

current++;

if(current<questions.length){

loadQuestion();

}
else{

document.getElementById("quiz").classList.add("hidden");

document.getElementById("finalChallenge").classList.remove("hidden");

}

}

function checkFinal(choice){

if(choice===1){

score++;

document.getElementById("score").textContent = score;

document.getElementById("finalFeedback").textContent =
"Correct! Doubling 6 times is written as 2⁶.";

playSound("correctSound");

createConfetti();

}
else{

document.getElementById("finalFeedback").textContent =
"Incorrect. The correct answer is 2⁶.";

playSound("wrongSound");

showCross();

}

setTimeout(showResult,1800);

}

function showResult(){

document.getElementById("finalChallenge").classList.add("hidden");

document.getElementById("result").classList.remove("hidden");

document.getElementById("finalScore").textContent = score+" / 11";

let msg = "Good effort!";

if(score>=9){

msg = "Outstanding! You are an Exponents Master!";

}
else if(score>=6){

msg = "Well done! Keep practising powers and exponents.";

}

document.getElementById("resultMsg").textContent = msg;

}

function restartQuiz(){

current = 0;
score = 0;

document.getElementById("score").textContent = "0";

document.getElementById("result").classList.add("hidden");

document.getElementById("intro").classList.remove("hidden");

}

function createConfetti(){

for(let i=0;i<25;i++){

const star = document.createElement("div");

star.className = "confetti";

star.style.left = Math.random()*100+"vw";

star.style.animationDelay = Math.random()*0.3+"s";

document.body.appendChild(star);

setTimeout(()=>{

star.remove();

},1500);

}

}

function showCross(){

const cross = document.getElementById("cross");

cross.classList.remove("show");

void cross.offsetWidth;

cross.classList.add("show");

}

function playSound(id){

const audio = document.getElementById(id);

audio.currentTime = 0;

audio.play().catch(()=>{});

}

</script>

</body>
</html>
