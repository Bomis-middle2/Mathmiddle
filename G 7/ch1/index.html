<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 7 Math CBQ Challenge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#eef7ff,#fff3dc);
  overflow-x:hidden;
}

#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffffff,#eef6ff);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#logoScreen img{
  width:65%;
  max-width:260px;
  animation:logoPulse 2s ease-in-out infinite;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,0.15));
}

@keyframes logoPulse{
  0%{transform:scale(.92);opacity:.85}
  50%{transform:scale(1);opacity:1}
  100%{transform:scale(.92);opacity:.85}
}

.fade-out{animation:fadeOut .8s ease forwards}

@keyframes fadeOut{
  from{opacity:1}
  to{opacity:0;visibility:hidden}
}

.bg span{
  position:fixed;
  color:rgba(255,180,0,.25);
  animation:float 12s linear infinite;
  z-index:-1;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.container{
  width:min(95%,900px);
  margin:20px auto;
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.topbar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.badge{
  background:#e8f2ff;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0 18px;
}

.bar{
  height:100%;
  width:0%;
  background:#2f6fed;
  transition:.3s;
}

h2,h3{margin-bottom:12px}

button{
  background:#2f6fed;
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  margin-top:12px;
  font-size:16px;
}

button:hover{background:#1f56c7}

.options button{
  width:100%;
  text-align:left;
  margin:8px 0;
  background:#fff;
  border:2px solid #e3ecff;
  color:#222;
}

.options button:disabled{cursor:not-allowed}

.correct{background:#d9f8dd!important;border-color:#2fbf4a!important}
.wrong{background:#ffdcdc!important;border-color:#e53935!important}

.box{
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  line-height:1.5;
}

.case{background:#fff6d8;border-left:5px solid #f0b400}
.assert{background:#eef6ff;border-left:5px solid #3b82f6}

#msg{
  margin-top:10px;
  font-weight:bold;
  line-height:1.5;
}

.hidden{display:none}

.star{
  position:fixed;
  top:-20px;
  font-size:22px;
  animation:fall 1.5s linear forwards;
  pointer-events:none;
}

@keyframes fall{
  to{transform:translateY(100vh);opacity:0}
}
</style>
</head>

<body>

<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="bg" id="bg"></div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<div class="container">

  <div class="topbar">
    <div class="badge">Score: <span id="score">0</span></div>
    <div class="badge">Q: <span id="qno">0</span></div>
    <div class="badge">Time: <span id="time">45</span>s</div>
  </div>

  <div class="progress"><div class="bar" id="bar"></div></div>

  <div id="intro">
    <h2>Grade 7 Math CBQ Challenge</h2>
    <p>Read carefully and choose the correct answer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="quiz" class="hidden">
    <div id="caseBox" class="box case hidden"></div>
    <div id="assertBox" class="box assert hidden"></div>

    <h3 id="question"></h3>

    <div class="options" id="options"></div>
    <div id="msg"></div>
  </div>

  <div id="result" class="hidden">
    <h2>Result</h2>
    <h3 id="finalScore"></h3>
    <p>Great effort! You completed the challenge.</p>
    <button onclick="location.reload()">Play Again</button>
  </div>

</div>

<script>
window.onload=function(){
  const splash=document.getElementById("logoScreen");
  setTimeout(()=>{
    splash.classList.add("fade-out");
    setTimeout(()=>{splash.style.display="none"},800);
  },5000);
};

const data=[
  {
    q:"The temperature in Shimla was ‚ąí4¬įC in the morning. By afternoon, it rose by 9¬įC. What was the afternoon temperature?",
    o:["‚ąí13¬įC","5¬įC","‚ąí5¬įC","13¬įC"],
    a:1,
    e:"‚ąí4 + 9 = 5¬įC"
  },
  {
    q:"In a quiz, +4 marks are given for a correct answer and ‚ąí2 for an incorrect answer. Riya gives 6 correct answers and 4 incorrect answers. What is her total score?",
    o:["16","20","24","32"],
    a:0,
    e:"(6 √ó 4) ‚ąí (4 √ó 2) = 24 ‚ąí 8 = 16"
  },
  {
    case:"A shopkeeper earns ‚āĻ50 profit on one shirt and loses ‚āĻ20 on one pair of trousers. On a day, he sells 6 shirts and 8 trousers.",
    q:"What is his total profit from shirts?",
    o:["‚āĻ250","‚āĻ300","‚āĻ350","‚āĻ400"],
    a:1,
    e:"6 √ó 50 = ‚āĻ300"
  },
  {
    case:"A shopkeeper earns ‚āĻ50 profit on one shirt and loses ‚āĻ20 on one pair of trousers. On a day, he sells 6 shirts and 8 trousers.",
    q:"What is his overall gain or loss?",
    o:["‚āĻ140 gain","‚āĻ160 loss","‚āĻ160 gain","‚āĻ460 gain"],
    a:0,
    e:"Profit from shirts = ‚āĻ300. Loss from trousers = 8 √ó 20 = ‚āĻ160. Overall = 300 ‚ąí 160 = ‚āĻ140 gain."
  },
  {
    assert:"Assertion: ‚ąí8 is greater than ‚ąí12<br>Reason: Among two negative integers, the number closer to zero is greater.",
    q:"Choose the correct option.",
    o:[
      "Both Assertion and Reason are true and Reason correctly explains Assertion",
      "Both Assertion and Reason are true but Reason does not explain Assertion",
      "Assertion is true but Reason is false",
      "Assertion is false but Reason is true"
    ],
    a:0,
    e:"‚ąí8 is closer to zero than ‚ąí12, so ‚ąí8 is greater."
  },
  {
    assert:"Assertion: 0 is a positive integer<br>Reason: 0 is neither positive nor negative.",
    q:"Choose the correct option.",
    o:[
      "Both Assertion and Reason are true and Reason correctly explains Assertion",
      "Both Assertion and Reason are true but Reason does not explain Assertion",
      "Assertion is true but Reason is false",
      "Assertion is false but Reason is true"
    ],
    a:3,
    e:"0 is not positive. It is neither positive nor negative."
  },
  {
    assert:"Assertion: Addition of integers is commutative<br>Reason: a + b = b + a.",
    q:"Choose the correct option.",
    o:[
      "Both Assertion and Reason are true and Reason correctly explains Assertion",
      "Both Assertion and Reason are true but Reason does not explain Assertion",
      "Assertion is true but Reason is false",
      "Assertion is false but Reason is true"
    ],
    a:0,
    e:"Addition is commutative because changing the order does not change the sum."
  },
  {
    q:"A submarine was at ‚ąí120 m below sea level. It moved up by 45 m. What is its new position?",
    o:["‚ąí165 m","‚ąí75 m","75 m","165 m"],
    a:1,
    e:"‚ąí120 + 45 = ‚ąí75 m"
  },
  {
    q:"A football team gets +3 for a win and ‚ąí1 for a loss. It wins 7 matches and loses 2. What is the total score?",
    o:["19","20","21","23"],
    a:0,
    e:"(7 √ó 3) + (2 √ó ‚ąí1) = 21 ‚ąí 2 = 19"
  },
  {
    q:"The temperature of a freezer is ‚ąí18¬įC. If it increases by 11¬įC, what is the new temperature?",
    o:["‚ąí29¬įC","‚ąí7¬įC","7¬įC","29¬įC"],
    a:1,
    e:"‚ąí18 + 11 = ‚ąí7¬įC"
  }
];

let qSet=[],i=0,score=0,t=45,tm,attempt=0;

function startGame(){
  qSet=[...data].sort(()=>Math.random()-.5);
  i=0;
  score=0;
  document.getElementById("score").innerText=score;
  document.getElementById("bar").style.width="0%";
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  load();
}

function load(){
  attempt=0;
  t=45;
  updateTime();
  document.getElementById("msg").innerText="";

  clearInterval(tm);
  tm=setInterval(()=>{
    t--;
    updateTime();
    if(t<=0) reveal();
  },1000);

  let q=qSet[i];

  document.getElementById("qno").innerText=(i+1)+"/"+qSet.length;
  document.getElementById("question").innerText=q.q;

  const caseBox=document.getElementById("caseBox");
  const assertBox=document.getElementById("assertBox");

  caseBox.classList.add("hidden");
  assertBox.classList.add("hidden");

  if(q.case){
    caseBox.innerHTML="<b>Case:</b><br>"+q.case;
    caseBox.classList.remove("hidden");
  }

  if(q.assert){
    assertBox.innerHTML=q.assert;
    assertBox.classList.remove("hidden");
  }

  let box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((x,idx)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(idx,b);
    box.appendChild(b);
  });

  updateBar();
}

function check(c,b){
  let q=qSet[i];

  if(c===q.a){
    score++;
    document.getElementById("score").innerText=score;
    b.classList.add("correct");
    play("correctSound");

    document.querySelectorAll(".options button").forEach(btn=>{
      btn.disabled=true;
    });

    setTimeout(next,800);
  }else{
    attempt++;
    b.classList.add("wrong");
    b.disabled=true;
    play("wrongSound");

    if(attempt===2){
      reveal();
    }
  }
}

function reveal(){
  clearInterval(tm);

  let q=qSet[i];
  document.getElementById("msg").innerText="Answer: "+q.o[q.a]+" | Explanation: "+q.e;

  document.querySelectorAll(".options button").forEach((btn,idx)=>{
    btn.disabled=true;
    if(idx===q.a){
      btn.classList.add("correct");
    }
  });

  setTimeout(next,2500);
}

function next(){
  clearInterval(tm);
  i++;

  if(i>=qSet.length){
    end();
    return;
  }

  load();
}

function end(){
  clearInterval(tm);
  document.getElementById("bar").style.width="100%";
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("finalScore").innerText=score+"/"+qSet.length;
  play("clapSound");
  star();
}

function updateTime(){
  document.getElementById("time").innerText=t;
}

function updateBar(){
  const progress=(i/qSet.length)*100;
  document.getElementById("bar").style.width=progress+"%";
}

function play(id){
  const sound=document.getElementById(id);
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function star(){
  for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="star";
    s.innerText="‚ėÖ";
    s.style.left=Math.random()*100+"vw";
    s.style.color=["#ffb703","#2f6fed","#2fbf4a","#ff6b6b"][Math.floor(Math.random()*4)];
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

for(let i=0;i<25;i++){
  const s=document.createElement("span");
  s.innerText="‚ėÖ";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(5+Math.random()*10)+"s";
  document.getElementById("bg").appendChild(s);
}
</script>

</body>
</html>
