<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBQ MCQ Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#eef7ff,#fff3dc);
  overflow-x:hidden;
}

/* ===================== SPLASH ===================== */
#logoScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffffff,#eef6ff);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeIn 0.8s ease;
}

#logoScreen img{
  width:65%;
  max-width:260px;
  animation:logoPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes logoPulse{
  0%{transform:scale(0.92);opacity:0.85;}
  50%{transform:scale(1);opacity:1;}
  100%{transform:scale(0.92);opacity:0.85;}
}

.fade-out{
  animation:fadeOut 0.8s ease forwards;
}

@keyframes fadeOut{
  from{opacity:1}
  to{opacity:0;visibility:hidden}
}

/* ===================== BACKGROUND ===================== */
.bg span{
  position:fixed;
  color:rgba(255,180,0,.25);
  animation:float 12s linear infinite;
  z-index:-1;
}
@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* ===================== MAIN UI ===================== */
.container{
  width:min(95%,900px);
  margin:20px auto;
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.topbar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.badge{
  background:#e8f2ff;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}
.bar{
  height:100%;
  width:0%;
  background:#2f6fed;
  transition:.3s;
}

button{
  background:#2f6fed;
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  margin-top:12px;
}

button:hover{background:#1f56c7}

.options button{
  width:100%;
  text-align:left;
  margin:8px 0;
  background:#fff;
  border:2px solid #e3ecff;
  color:#222;
}

.correct{background:#d9f8dd!important;border-color:#2fbf4a!important}
.wrong{background:#ffdcdc!important;border-color:#e53935!important}

.box{
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}
.case{background:#fff6d8;border-left:5px solid #f0b400}
.assert{background:#eef6ff;border-left:5px solid #3b82f6}

.hidden{display:none}

.star{
  position:fixed;
  top:-20px;
  font-size:20px;
  animation:fall 1.5s linear forwards;
}

@keyframes fall{
  to{transform:translateY(100vh);opacity:0}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="logoScreen">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- BACKGROUND -->
<div class="bg" id="bg"></div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<div class="container">

  <div class="topbar">
    <div class="badge">Score: <span id="score">0</span></div>
    <div class="badge">Q: <span id="qno">0</span></div>
    <div class="badge">Time: <span id="time">45</span>s</div>
  </div>

  <div class="progress"><div class="bar" id="bar"></div></div>

  <div id="intro">
    <h2>CBQ Challenge</h2>
    <button onclick="startGame()">Start</button>
  </div>

  <div id="quiz" class="hidden">
    <h3 id="question"></h3>

    <div id="caseBox" class="box case hidden"></div>
    <div id="assertBox" class="box assert hidden"></div>

    <div class="options" id="options"></div>
    <div id="msg"></div>
  </div>

  <div id="result" class="hidden">
    <h2>Result</h2>
    <h3 id="finalScore"></h3>
    <button onclick="location.reload()">Play Again</button>
  </div>

</div>

<script>

/* ================= SPLASH CONTROL ================= */
window.onload = function () {
  const splash = document.getElementById("logoScreen");

  setTimeout(() => {
    splash.classList.add("fade-out");

    setTimeout(() => {
      splash.style.display = "none";
    }, 800);

  }, 5000);
};

/* ================= GAME DATA ================= */
const data=[
 {q:"2 + 3 = ?",o:["4","5","6","7"],a:1,e:"2+3=5"},
 {q:"5 - 2 = ?",o:["2","3","4","5"],a:1,e:"5-2=3"}
];

let qSet=[],i=0,score=0,t=45,tm,attempt=0;

/* ================= START ================= */
function startGame(){
  qSet=data;
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  load();
}

/* ================= LOAD QUESTION ================= */
function load(){
  attempt=0;
  t=45;
  updateTime();

  clearInterval(tm);
  tm=setInterval(()=>{
    t--;
    updateTime();
    if(t<=0) next();
  },1000);

  let q=qSet[i];

  document.getElementById("qno").innerText=(i+1)+"/"+qSet.length;
  document.getElementById("question").innerText=q.q;

  let box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((x,idx)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(idx,b);
    box.appendChild(b);
  });

  document.getElementById("caseBox").classList.add("hidden");
  document.getElementById("assertBox").classList.add("hidden");

  updateBar();
}

/* ================= CHECK ANSWER ================= */
function check(c,b){
  let q=qSet[i];

  if(c===q.a){
    score++;
    document.getElementById("score").innerText=score;
    b.classList.add("correct");
    play("correctSound");
    setTimeout(next,800);
  }else{
    attempt++;
    b.classList.add("wrong");
    play("wrongSound");

    if(attempt===2){
      reveal();
    }
  }
}

/* ================= REVEAL ================= */
function reveal(){
  let q=qSet[i];
  document.getElementById("msg").innerText="Answer: "+q.o[q.a]+" - "+q.e;
  setTimeout(next,2000);
}

/* ================= NEXT ================= */
function next(){
  i++;
  if(i>=qSet.length){
    end();
    return;
  }
  load();
}

/* ================= END ================= */
function end(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
  document.getElementById("finalScore").innerText=score+"/"+qSet.length;
  play("clapSound");
  star();
}

/* ================= UI HELPERS ================= */
function updateTime(){
  document.getElementById("time").innerText=t;
}

function updateBar(){
  document.getElementById("bar").style.width=(i/qSet.length)*100+"%";
}

function play(id){
  document.getElementById(id).play();
}

/* ================= CONFETTI ================= */
function star(){
  for(let i=0;i<20;i++){
    let s=document.createElement("div");
    s.className="star";
    s.innerText="★";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

/* ================= BG EFFECT ================= */
for(let i=0;i<25;i++){
  const s=document.createElement("span");
  s.innerText="★";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(5+Math.random()*10)+"s";
  document.getElementById("bg").appendChild(s);
}

</script>

</body>
</html>
